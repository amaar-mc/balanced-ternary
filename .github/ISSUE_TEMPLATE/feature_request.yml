name: Feature Request
description: Suggest a new feature or API addition
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe what you want and why.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: How would the feature be used?
      placeholder: |
        from balanced_ternary import BalancedTernary
        bt = BalancedTernary.from_int(5)
        bt.some_new_method()
